<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中介平台 - 管理面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #333; margin-bottom: 8px; font-size: 24px; }
        .subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 16px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .header h2 { font-size: 16px; color: #333; }
        .btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: #1890ff; color: white; }
        .btn-success { background: #52c41a; color: white; }
        .btn-danger { background: #ff4d4f; color: white; }
        .btn-ghost { background: transparent; color: #1890ff; border: 1px solid #1890ff; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        th { background: #fafafa; color: #666; font-weight: 500; font-size: 12px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .badge-pending { background: #fff7e6; color: #fa8c16; }
        .badge-approved { background: #f6ffed; color: #52c41a; }
        .badge-rejected { background: #fff1f0; color: #ff4d4f; }
        .badge-routing { background: #e6f7ff; color: #1890ff; }
        .badge-sent { background: #e6f7ff; color: #1890ff; }
        .badge-replied { background: #f6ffed; color: #52c41a; }
        .empty { text-align: center; color: #999; padding: 30px; font-size: 13px; }
        .input { padding: 6px 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; width: 100%; }
        .input:focus { outline: none; border-color: #1890ff; }
        .form-row { display: grid; grid-template-columns: 100px 1fr auto; gap: 8px; align-items: center; margin-bottom: 10px; }
        .form-row label { font-size: 13px; color: #666; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
        .stat-card { background: white; border-radius: 8px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-label { color: #888; font-size: 12px; }
        .stat-value { color: #1890ff; font-size: 24px; font-weight: 600; margin-top: 4px; }
        .stat-success .stat-value { color: #52c41a; }
        .stat-danger .stat-value { color: #ff4d4f; }
        .stat-warning .stat-value { color: #fa8c16; }
        pre.metrics { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 4px; font-size: 12px; max-height: 200px; overflow: auto; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 10px 20px; border-radius: 4px; color: white; font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 1000; }
        .toast.show { opacity: 1; }
        .toast.success { background: #52c41a; }
        .toast.error { background: #ff4d4f; }
        .tag-skill { display: inline-block; padding: 1px 6px; border-radius: 3px; background: #f0f5ff; color: #1890ff; font-size: 11px; margin-right: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>中介平台 - 管理面板</h1>
        <div class="subtitle">实时查看数据、审批请求、管理规则与配额</div>

        <!-- 统计概览 -->
        <div class="stats">
            <div class="stat-card stat-warning">
                <div class="stat-label">待审批</div>
                <div class="stat-value" id="stat-pending">-</div>
            </div>
            <div class="stat-card stat-success">
                <div class="stat-label">已批准</div>
                <div class="stat-value" id="stat-approved">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">路由中</div>
                <div class="stat-value" id="stat-routes">-</div>
            </div>
            <div class="stat-card stat-danger">
                <div class="stat-label">安全事件</div>
                <div class="stat-value" id="stat-security">-</div>
            </div>
        </div>

        <!-- 审批台 -->
        <div class="card">
            <div class="header">
                <h2>待审批请求</h2>
                <button class="btn btn-ghost" onclick="loadPending()">刷新</button>
            </div>
            <div id="pending-list"></div>
        </div>

        <!-- 路由列表 -->
        <div class="card">
            <div class="header">
                <h2>路由列表</h2>
                <button class="btn btn-ghost" onclick="loadRoutes()">刷新</button>
            </div>
            <div id="routes-list"></div>
        </div>

        <!-- 规则管理 -->
        <div class="card">
            <div class="header">
                <h2>规则管理</h2>
                <button class="btn btn-ghost" onclick="loadRules()">刷新</button>
            </div>
            <div id="rules-list"></div>
            <h3 style="margin: 16px 0 8px; font-size: 14px; color: #666;">添加新规则</h3>
            <div class="form-row">
                <label>ID</label>
                <input class="input" id="rule-id" placeholder="rule_xxx">
                <button class="btn btn-primary" onclick="addRule()">添加</button>
            </div>
            <div class="form-row">
                <label>名称</label>
                <input class="input" id="rule-name" placeholder="规则名称">
            </div>
            <div class="form-row">
                <label>优先级</label>
                <input class="input" id="rule-priority" type="number" placeholder="0">
            </div>
            <div class="form-row">
                <label>Action</label>
                <input class="input" id="rule-action" placeholder="auto_approve / auto_reject / manual_review">
            </div>
            <div class="form-row">
                <label>Conditions</label>
                <input class="input" id="rule-conditions" placeholder='[{"field":"source","op":"==","value":"x"}]'>
            </div>
        </div>

        <!-- 配额管理 -->
        <div class="card">
            <div class="header">
                <h2>配额管理</h2>
                <button class="btn btn-ghost" onclick="loadQuotas()">刷新</button>
            </div>
            <div id="quotas-list"></div>
            <h3 style="margin: 16px 0 8px; font-size: 14px; color: #666;">设置配额</h3>
            <div class="form-row">
                <label>来源</label>
                <input class="input" id="quota-source" placeholder="猎头_skill">
                <button class="btn btn-primary" onclick="setQuota()">设置</button>
            </div>
            <div class="form-row">
                <label>限制</label>
                <input class="input" id="quota-limit" type="number" placeholder="100">
            </div>
        </div>

        <!-- 指标 -->
        <div class="card">
            <div class="header">
                <h2>Prometheus 指标</h2>
                <button class="btn btn-ghost" onclick="loadMetrics()">刷新</button>
            </div>
            <pre class="metrics" id="metrics-content">加载中...</pre>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ============= 基础配置 =============
        // 从 localStorage 读取 token,默认空
        let AUTH_TOKEN = localStorage.getItem('mediator_token') || '';
        const BASE = window.location.origin;

        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                ...(AUTH_TOKEN ? { 'Authorization': AUTH_TOKEN } : {})
            };
        }

        function showToast(msg, isError) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show ' + (isError ? 'error' : 'success');
            setTimeout(() => t.className = 'toast', 2500);
        }

        async function api(method, path, body) {
            const opts = { method, headers: authHeaders() };
            if (body) opts.body = JSON.stringify(body);
            const r = await fetch(BASE + path, opts);
            if (r.status === 401) {
                showToast('未授权:请先在 Token 框中设置', true);
                throw new Error('unauthorized');
            }
            if (!r.ok) {
                const err = await r.text();
                showToast(`请求失败 ${r.status}: ${err.slice(0, 100)}`, true);
                throw new Error(err);
            }
            return r.json();
        }

        // 通用: 兼容 list / {data: list} / {data: {items: list}} / {items: list} 四种返回
        function unwrap(data) {
            if (Array.isArray(data)) return data;
            if (data && typeof data === 'object') {
                if (Array.isArray(data.data)) return data.data;
                if (data.data && Array.isArray(data.items)) return data.data.items;
                if (Array.isArray(data.items)) return data.items;
                return data.data || data;
            }
            return [];
        }

        // ============= Token 输入 =============
        function ensureToken() {
            const t = prompt('请输入 API Token (在 /api/auth/token 获取):', AUTH_TOKEN);
            if (t) {
                AUTH_TOKEN = t;
                localStorage.setItem('mediator_token', t);
                showToast('Token 已保存');
                refreshAll();
            }
        }

        // ============= 加载逻辑 =============
        async function loadPending() {
            try {
                const r = await api('GET', '/api/pending');
                const list = unwrap(r);
                const el = document.getElementById('pending-list');
                if (list.length === 0) {
                    el.innerHTML = '<div class="empty">暂无待审批</div>';
                } else {
                    el.innerHTML = '<table><tr><th>ID</th><th>来源</th><th>意图</th><th>建议</th><th>操作</th></tr>'
                        + list.map(p => `<tr>
                            <td><code>${(p.request?.id || '').slice(0, 16)}</code></td>
                            <td><span class="tag-skill">${p.request?.source || '-'}</span></td>
                            <td>${p.request?.intent || '-'}</td>
                            <td>${p.suggestion || '-'}</td>
                            <td>
                                <button class="btn btn-success" onclick="approve('${p.request?.id}')">通过</button>
                                <button class="btn btn-danger" onclick="reject('${p.request?.id}')">拒绝</button>
                            </td>
                        </tr>`).join('') + '</table>';
                }
                document.getElementById('stat-pending').textContent = list.length;
            } catch (e) { /* 已在 api() 中处理 */ }
        }

        async function loadRoutes() {
            try {
                const r = await api('GET', '/api/routes');
                const list = unwrap(r);
                const el = document.getElementById('routes-list');
                if (list.length === 0) {
                    el.innerHTML = '<div class="empty">暂无路由</div>';
                } else {
                    el.innerHTML = '<table><tr><th>ID</th><th>From → To</th><th>状态</th><th>创建时间</th></tr>'
                        + list.map(rt => `<tr>
                            <td><code>${(rt.id || '').slice(0, 16)}</code></td>
                            <td>${rt.from_skill} → ${rt.to_skill}</td>
                            <td><span class="badge badge-${rt.status}">${rt.status}</span></td>
                            <td>${(rt.created_at || '').slice(0, 19)}</td>
                        </tr>`).join('') + '</table>';
                }
                document.getElementById('stat-routes').textContent = list.length;
            } catch (e) { /* ignore */ }
        }

        async function loadRules() {
            try {
                const r = await api('GET', '/api/rules');
                const list = unwrap(r);
                const el = document.getElementById('rules-list');
                if (list.length === 0) {
                    el.innerHTML = '<div class="empty">暂无规则</div>';
                } else {
                    el.innerHTML = '<table><tr><th>ID</th><th>名称</th><th>优先级</th><th>Action</th><th>启用</th><th>操作</th></tr>'
                        + list.map(rule => `<tr>
                            <td><code>${rule.id}</code></td>
                            <td>${rule.name}</td>
                            <td>${rule.priority}</td>
                            <td>${rule.action}</td>
                            <td>${rule.enabled ? '✓' : '✗'}</td>
                            <td>
                                <button class="btn btn-danger" onclick="deleteRule('${rule.id}')">删除</button>
                            </td>
                        </tr>`).join('') + '</table>';
                }
            } catch (e) { /* ignore */ }
        }

        async function loadQuotas() {
            // 先获取所有配额需要先知道有哪些 source
            // 简化:从已批准/已路由中收集 source
            try {
                const r = await api('GET', '/api/approvals');
                const list = unwrap(r);
                const sources = new Set(list.map(a => a.tenant_id || 'default'));
                sources.add('猎头_skill');
                sources.add('甲方_skill');

                const results = await Promise.all([...sources].map(async s => {
                    try {
                        const qr = await api('POST', '/skill/平台_skill/get_quota', { source: s });
                        return { source: s, ...qr.data };
                    } catch { return null; }
                }));

                const el = document.getElementById('quotas-list');
                const valid = results.filter(r => r && r.hourly_limit !== undefined);
                if (valid.length === 0) {
                    el.innerHTML = '<div class="empty">暂无配额配置</div>';
                } else {
                    el.innerHTML = '<table><tr><th>来源</th><th>限制</th><th>已用</th><th>剩余</th><th>重置时间</th></tr>'
                        + valid.map(q => `<tr>
                            <td>${q.source}</td>
                            <td>${q.hourly_limit}/h</td>
                            <td>${q.used || 0}</td>
                            <td>${q.remaining || 0}</td>
                            <td>${(q.reset_at || '').slice(0, 19)}</td>
                        </tr>`).join('') + '</table>';
                }
            } catch (e) { /* ignore */ }
        }

        async function loadMetrics() {
            try {
                const r = await fetch(BASE + '/metrics');
                document.getElementById('metrics-content').textContent = await r.text();
            } catch (e) { /* ignore */ }
        }

        async function loadSecurity() {
            try {
                const r = await api('GET', '/api/security');
                const list = unwrap(r);
                document.getElementById('stat-security').textContent = list.length;
            } catch { /* ignore */ }
        }

        // ============= 写操作 =============
        async function approve(id) {
            try {
                await api('POST', `/api/approval/${id}/approve`, { decided_by: 'admin', comment: '通过' });
                showToast('已批准');
                loadPending();
            } catch (e) { /* ignore */ }
        }

        async function reject(id) {
            try {
                await api('POST', `/api/approval/${id}/reject`, { decided_by: 'admin', comment: '拒绝' });
                showToast('已拒绝');
                loadPending();
            } catch (e) { /* ignore */ }
        }

        async function addRule() {
            const id = document.getElementById('rule-id').value;
            const name = document.getElementById('rule-name').value;
            const priority = parseInt(document.getElementById('rule-priority').value || '0');
            const action = document.getElementById('rule-action').value;
            const conditionsStr = document.getElementById('rule-conditions').value || '[]';
            if (!id || !name || !action) {
                showToast('ID/名称/Action 必填', true);
                return;
            }
            try {
                const conditions = JSON.parse(conditionsStr);
                await api('POST', '/api/rules', { id, name, priority, action, conditions, enabled: true });
                showToast('规则已添加');
                loadRules();
            } catch (e) {
                showToast('添加失败: ' + e.message, true);
            }
        }

        async function deleteRule(id) {
            if (!confirm(`删除规则 ${id}?`)) return;
            try {
                await api('DELETE', `/api/rules/${id}`);
                showToast('已删除');
                loadRules();
            } catch (e) { /* ignore */ }
        }

        async function setQuota() {
            const source = document.getElementById('quota-source').value;
            const limit = parseInt(document.getElementById('quota-limit').value);
            if (!source || !limit) {
                showToast('来源/限制 必填', true);
                return;
            }
            try {
                await api('PUT', `/api/quota/${source}`, { hourly_limit: limit });
                showToast(`配额已设置: ${source} -> ${limit}/h`);
                loadQuotas();
            } catch (e) { /* ignore */ }
        }

        // ============= 入口 =============
        function refreshAll() {
            loadPending();
            loadRoutes();
            loadRules();
            loadQuotas();
            loadMetrics();
            loadSecurity();
        }

        if (!AUTH_TOKEN) {
            ensureToken();
        } else {
            refreshAll();
            setInterval(refreshAll, 15000);
        }
    </script>
</body>
</html>
